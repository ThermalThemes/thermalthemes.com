<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thermal Themes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="logo">{tt}</div>
    <p class="positioning">Premium Shopify themes for specialty retailers.</p>
    <form class="capture" action="#" method="post">
      <label for="email" class="sr-only">Email address</label>
      <input id="email" type="email" name="email" placeholder="your@email.com" required autocomplete="email">
      <button type="submit">Notify me</button>
    </form>
    <p class="contact">Questions? <a href="mailto:hello@thermalthemes.com">hello@thermalthemes.com</a></p>
  </main>
</body>
</html>
