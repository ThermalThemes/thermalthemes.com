<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal received — Thermal Themes</title>
  <meta name="description" content="Your message has been received. We respond within one business day.">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter+Tight:wght@400;500;700;900&display=swap">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="grain"></div>

  <header class="bar bar--top">
    <a class="bar__item bar__link" href="/">THERMAL/THEMES</a>
    <span class="bar__item bar__item--center">REC 0001 — TRANSMITTED</span>
    <span class="bar__item bar__item--right">EST 2026</span>
  </header>

  <main class="stage">

    <section class="hero">
      <div class="hero__chrome">
        <span class="tick">SIG OK</span>
        <span class="tick">RX QUEUED</span>
        <span class="tick">RT &lt;24H</span>
      </div>
      <h1 class="hero__title">
        <span class="hero__line">Signal</span>
        <span class="hero__line hero__line--accent">received.</span>
      </h1>
      <p class="hero__lede">
        Message logged. We respond within one business day. Watch your inbox for a reply from thermalthemes@gmail.com — check spam if you don't see it.
      </p>
      <div class="hero__meta">
        <a class="cta" href="/">
          <span class="cta__label">Return to studio</span>
          <span class="cta__addr">→</span>
        </a>
      </div>
    </section>

  </main>

  <footer class="bar bar--bottom">
    <span class="bar__item">© THERMAL THEMES</span>
    <span class="bar__item bar__item--center">SIGNAL/RUNNING</span>
    <span class="bar__item bar__item--right">RX OK</span>
  </footer>
</body>
</html>
